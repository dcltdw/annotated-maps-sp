name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env: { POSTGRES_DB: annotated_maps, POSTGRES_USER: annotated_maps, POSTGRES_PASSWORD: localdev }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U annotated_maps" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgis://annotated_maps:localdev@localhost:5432/annotated_maps
      DJANGO_SECRET_KEY: ci-insecure
      DJANGO_DEBUG: "false"
      SECURE_SSL_REDIRECT: "false"   # CORRECTION: don't 301 the test client under DEBUG=false
      DJANGO_ALLOWED_HOSTS: "localhost,testserver"
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - name: Install GDAL/GEOS (Django GIS native libs)   # CORRECTION
        run: sudo apt-get update && sudo apt-get install -y binutils libproj-dev gdal-bin libgdal-dev libgeos-dev
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --run
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - run: npm run e2e:prod # production-build guards (built CSS) against `vite preview`

  pr-rigor:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python .github/scripts/check_pr_body.py

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq (pinned, like every other tool here)
        run: |
          sudo curl -fsSL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - name: Checker unit tests
        run: python3 -m unittest discover -s .github/scripts -v
      - name: Doc link check (Layer 1)
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 .github/scripts/check_doc_links.py --allow-override
      - name: Doc link check (Layer 1 — main; overrides do not apply here)
        if: github.event_name != 'pull_request'
        run: python3 .github/scripts/check_doc_links.py
      - name: Doc facts, pr tier (Layer 2)
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 .github/scripts/check_doc_facts.py --tier pr --allow-override
      - name: Doc facts, pr tier (Layer 2 — main; overrides do not apply here)
        if: github.event_name != 'pull_request'
        run: python3 .github/scripts/check_doc_facts.py --tier pr

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Install promtool
        run: |
          curl -sSL https://github.com/prometheus/prometheus/releases/download/v3.13.0/prometheus-3.13.0.linux-amd64.tar.gz | tar xz
          sudo mv prometheus-3.13.0.linux-amd64/promtool /usr/local/bin/
      - run: make helm-checks
      - run: make obs-checks

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"
      - name: terraform fmt
        run: terraform fmt -check -recursive deploy/terraform
      - name: terraform validate (foundation)
        run: |
          terraform -chdir=deploy/terraform/foundation init -backend=false
          terraform -chdir=deploy/terraform/foundation validate
      - name: terraform validate (demo)
        run: |
          terraform -chdir=deploy/terraform/demo init -backend=false
          terraform -chdir=deploy/terraform/demo validate
      - name: tflint
        run: |
          curl -fsSL https://github.com/terraform-linters/tflint/releases/download/v0.63.1/tflint_linux_amd64.zip -o /tmp/tflint.zip
          (cd /tmp && unzip -o tflint.zip && sudo mv tflint /usr/local/bin/)
          tflint --chdir=deploy/terraform/foundation
          tflint --chdir=deploy/terraform/demo
      - name: shellcheck demo scripts
        # Glob, not a hand-maintained list: the list had silently drifted to
        # cover 3 of 7 scripts (the phase scripts and neon-branch.sh landed
        # ungated). A glob cannot rot when the next script is added.
        #
        # Pinned, like every other linter here (terraform/tflint/kubeconform/
        # promtool/actionlint): the runner image's shellcheck floats, and its
        # version decides which checks are on by default — 0.11.0 dropped
        # SC2015 from the defaults, so "green locally" did not mean "green in
        # CI" until this was pinned.
        run: |
          curl -fsSL https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz | tar -xJ
          shellcheck-v0.11.0/shellcheck --version | grep version:
          shellcheck-v0.11.0/shellcheck scripts/*.sh
      - name: actionlint (workflow lint)
        run: |
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz | tar xz actionlint
          ./actionlint .github/workflows/ci.yml .github/workflows/demo-pipeline.yml .github/workflows/docs-accuracy.yml
      - name: forbid pull_request_target + the AWS deploy role (ADR-0010 invariant)
        # actionlint cannot know that `pull_request_target` + `environment:
        # aws-deploy` would hand a fork an AdministratorAccess-equivalent role.
        # ADR-0010 recorded that as a human invariant; this makes it a gate.
        run: python .github/scripts/check_workflow_triggers.py

  # Detects whether a PR touches the Terraform. infra-plan (which pauses for a
  # human approval before it can touch AWS) then only runs — and only asks for
  # approval — on PRs that actually change infrastructure, not on every PR.
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      terraform: ${{ steps.f.outputs.terraform }}
      pipeline_inflight: ${{ steps.p.outputs.inflight }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: f
        name: Did this PR change deploy/terraform/?
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              | grep -q '^deploy/terraform/'; then
            echo "terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "terraform=false" >> "$GITHUB_OUTPUT"
          fi
      - id: p
        name: Is a demo-pipeline run in flight?
        # infra-plan refreshes REAL state with -lock=false. If a demo-pipeline
        # run is mid-apply, the state is being written, so a read-only plan is
        # unreliable — and it exercises read-permission gaps an empty-state plan
        # never touches (the first was logs:ListTagsForResource; issue #112).
        # If a run is active, skip infra-plan entirely rather than fail on a
        # spurious AccessDenied / inconsistent refresh; re-run after teardown.
        # Fail-open: if the check itself errors, treat as not-in-flight so
        # infra-plan still runs (worst case is the pre-existing behavior).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          n=0
          for s in in_progress queued waiting; do
            c=$(gh api -X GET \
              "repos/${{ github.repository }}/actions/workflows/demo-pipeline.yml/runs" \
              -f status="$s" --jq '.total_count' 2>/dev/null || echo 0)
            n=$((n + ${c:-0}))
          done
          if [ "$n" -gt 0 ]; then
            echo "A demo-pipeline run is in flight ($n) — infra-plan will skip (issue #112)."
            echo "inflight=true" >> "$GITHUB_OUTPUT"
          else
            echo "inflight=false" >> "$GITHUB_OUTPUT"
          fi

  infra-plan:
    # Fork-safe `terraform plan`, only on PRs that change the Terraform. It runs
    # in the protected `aws-plan` Environment (required reviewer), so a PR —
    # including one from a fork — PAUSES for human approval before any OIDC token
    # is issued. The CI role's trust policy only accepts the
    # `...:environment:aws-plan` sub, so nothing outside this Environment can
    # assume it. The role is read-only: it can plan, never apply.
    #
    # Skipped when a demo-pipeline run is in flight (issue #112): planning
    # against a state that a live apply is actively writing is unreliable even
    # with perfect read permissions, so the honest answer is to skip and re-run
    # after teardown, not to chase read-permission gaps or trust a mid-apply plan.
    needs: changes
    if: needs.changes.outputs.terraform == 'true' && needs.changes.outputs.pipeline_inflight != 'true'
    runs-on: ubuntu-latest
    environment: aws-plan
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"
      - name: OIDC auth (read-only CI role; no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: us-east-1
      - name: terraform plan (read-only)
        # -lock=false: the CI role can't write the native S3 state lock
        # (GetObject/ListBucket only), and a read-only plan doesn't need it.
        run: |
          terraform -chdir=deploy/terraform/demo init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"
          # budget_alert_email moved to the foundation stack in the split; the
          # demo stack declares no such variable, so no -var is needed.
          terraform -chdir=deploy/terraform/demo plan -input=false -lock=false

  helm-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: chart-testing
      - name: Build images
        run: |
          docker build -f backend/Dockerfile -t annotated-maps-api:dev .
          docker build -f frontend/Dockerfile -t annotated-maps-web:dev frontend
      - name: Load images into kind
        run: |
          kind load docker-image annotated-maps-api:dev --name chart-testing
          kind load docker-image annotated-maps-web:dev --name chart-testing
      - name: Install the chart
        run: helm install annotated-maps deploy/helm/annotated-maps -n annotated-maps --create-namespace --wait --timeout 5m
      - name: Rollout status
        run: |
          kubectl -n annotated-maps rollout status deploy/annotated-maps-api --timeout 120s
          kubectl -n annotated-maps rollout status deploy/annotated-maps-web --timeout 120s
      - name: helm test (in-cluster health check)
        run: helm test annotated-maps -n annotated-maps --logs
      - name: Smoke the web tier
        run: |
          kubectl -n annotated-maps port-forward svc/annotated-maps-web 8081:80 &
          sleep 3
          curl -fsS http://localhost:8081/ | grep -qi "<!doctype html"
      - name: Smoke the metrics endpoint (cluster-internal)
        run: |
          # Prometheus scrapes each pod at its own IP, so that IP arrives as the
          # Host header and each pod's ALLOWED_HOSTS allows only ITS OWN IP.
          # Port-forward a specific pod and use that same pod's IP — forwarding
          # the Service while reading .items[0]'s IP is a coin flip across
          # replicas (pod A's IP sent to pod B → DisallowedHost 400).
          # (phase=Running alone still matches Terminating pods — filter those out)
          POD=$(kubectl -n annotated-maps get pod -l app.kubernetes.io/component=api \
            --field-selector=status.phase=Running -o json \
            | jq -r '[.items[] | select(.metadata.deletionTimestamp == null)][0].metadata.name')
          POD_IP=$(kubectl -n annotated-maps get pod "$POD" -o jsonpath='{.status.podIP}')
          kubectl -n annotated-maps port-forward "pod/$POD" 8082:8000 &
          sleep 3
          curl -fsS http://localhost:8082/metrics | grep -q django_http_responses_total_by_status_total
          curl -fsS -H "Host: ${POD_IP}:8000" http://localhost:8082/metrics \
            | grep -q django_http_responses_total_by_status_total
