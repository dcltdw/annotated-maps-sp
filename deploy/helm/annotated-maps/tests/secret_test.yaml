suite: shared secret hook ordering
templates:
  - templates/secret.yaml
tests:
  - it: is a plain (non-hook) resource when postgres is in-cluster (dev default)
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/hook"]
  - it: becomes a pre-install hook at weight -5 (before the migrate hook, weight 0) when the DB is external
    set:
      postgres: { enabled: false }
      secrets: { databaseUrl: "postgis://u:p@h:5432/d" }
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-5"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation
