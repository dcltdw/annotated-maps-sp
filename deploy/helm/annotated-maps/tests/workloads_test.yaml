# deploy/helm/annotated-maps/tests/workloads_test.yaml
suite: web + ingress
templates:
  - templates/web-deployment.yaml
  - templates/ingress.yaml
tests:
  - it: web probes /
    template: templates/web-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /
  - it: ingress routes /api to the api service and / to the web service
    template: templates/ingress.yaml
    asserts:
      - lengthEqual:
          path: spec.rules[0].http.paths
          count: 2
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /api
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: RELEASE-NAME-annotated-maps-api
      - equal:
          path: spec.rules[0].http.paths[1].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[1].backend.service.name
          value: RELEASE-NAME-annotated-maps-web
  - it: ingress renders annotations when set and omits the block by default
    template: templates/ingress.yaml
    set:
      ingress:
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
    asserts:
      - equal:
          path: metadata.annotations["alb.ingress.kubernetes.io/scheme"]
          value: internet-facing
  - it: ingress omits the host key entirely when host is empty (ALB DNS unknown pre-create)
    template: templates/ingress.yaml
    set:
      ingress:
        host: ""
    asserts:
      - notExists:
          path: spec.rules[0].host
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /api
