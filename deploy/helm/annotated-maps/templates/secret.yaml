# THE one Secret every workload consumes (api, migrate hook, reaper, postgres password).
# One source of truth prevents per-workload config drift (the PR #42 bug class).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "annotated-maps.fullname" . }}-secrets
  labels:
    {{- include "annotated-maps.labels" . | nindent 4 }}
  {{- if not .Values.postgres.enabled }}
  # External-DB path (prod/demo): the migrate hook runs PRE-install (weight 0),
  # before the main phase where a normal Secret would be created. So the Secret
  # must itself be a pre-install hook at a LOWER weight (-5), so it exists when
  # the migrate hook — and the app pods that envFrom it — need it. (The
  # in-cluster-postgres path uses a POST-install migrate hook, where the
  # main-phase Secret is already present, so no hook annotation is added there.)
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
  {{- end }}
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ include "annotated-maps.djangoSecretKey" . | quote }}
  DATABASE_URL: {{ include "annotated-maps.databaseUrl" . | quote }}
  MOD_TOKEN: {{ .Values.secrets.modToken | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
