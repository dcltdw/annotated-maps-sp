services:
  - type: web
    name: annotated-maps-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/health
    # Migrate, then rebuild the demo seed from code (--refresh) on every deploy.
    # Render does NOT run preDeployCommand through a shell, so `&&` can't chain —
    # the steps live in predeploy.sh, which sh runs in order. (predeploy.sh is at
    # /app/predeploy.sh via the Dockerfile's `COPY backend/ ./`.)
    preDeployCommand: sh predeploy.sh
    envVars:
      - key: DATABASE_URL
        sync: false   # Neon connection string, set per-environment
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: SANDBOX_MODE
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # the web service's public URL, e.g. https://annotated-maps-web.onrender.com
      - key: MOD_TOKEN
        sync: false   # a long random string; enables the /moderate tooling
      # Observability (M2). Telemetry exports to Grafana Cloud (free tier).
      # Declared here so a blueprint sync doesn't drop them; values live in the
      # Render dashboard. Secrets (the OTLP token) are sync:false — never committed.
      - key: OTEL_ENABLED
        value: "true"
      - key: OTEL_SERVICE_NAME
        value: annotated-maps-api
      - key: DEPLOY_ENV
        value: render
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false   # Grafana Cloud OTLP gateway, e.g. https://otlp-gateway-<region>.grafana.net/otlp
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false   # Authorization=Basic <base64>; carries the Grafana Cloud token — SECRET
  - type: web
    name: annotated-maps-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        sync: false
      - key: VITE_SANDBOX
        value: "true"
  - type: cron
    name: annotated-maps-reaper
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    schedule: "17 4 * * *"   # daily 04:17 UTC
    dockerCommand: uv run python manage.py reap_ephemeral
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        # The reaper only hard-deletes old rows; it never verifies signed cookies or
        # tokens, so its key need NOT match the API's — let Render generate one (a bare
        # `sync: false` here means "a human must set it", which is how this got missed).
        generateValue: true
      - key: SANDBOX_MODE
        value: "true"
