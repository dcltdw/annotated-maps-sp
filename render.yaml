services:
  - type: web
    name: annotated-maps-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/health
    # Migrate, then rebuild the demo seed from code so each deploy re-applies it
    # (--refresh, since seed_demo is otherwise get_or_create and won't update notes).
    preDeployCommand: uv run python manage.py migrate && uv run python manage.py seed_demo --refresh
    envVars:
      - key: DATABASE_URL
        sync: false   # Neon connection string, set per-environment
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: SANDBOX_MODE
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # the web service's public URL, e.g. https://annotated-maps-web.onrender.com
      - key: MOD_TOKEN
        sync: false   # a long random string; enables the /moderate tooling
  - type: web
    name: annotated-maps-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        sync: false
      - key: VITE_SANDBOX
        value: "true"
  - type: cron
    name: annotated-maps-reaper
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    schedule: "17 4 * * *"   # daily 04:17 UTC
    dockerCommand: uv run python manage.py reap_ephemeral
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: SANDBOX_MODE
        value: "true"
